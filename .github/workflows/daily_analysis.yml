name: Daily Stock Analysis

on:
  schedule:
    - cron: '0 10 * * 1-5'     # 3:30 PM IST (after India close)
    - cron: '30 21 * * 1-5'    # 4:30 PM ET (after US close)
  workflow_dispatch:
    inputs:
      stocks:
        description: 'Override stock list (comma-separated)'
        required: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analysis
        run: python main.py ${{ inputs.stocks && format('--stocks {0}', inputs.stocks) || '' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          STOCK_LIST: ${{ inputs.stocks || secrets.STOCK_LIST }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          SERPAPI_API_KEYS: ${{ secrets.SERPAPI_API_KEYS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS }}

      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-${{ github.run_id }}
          path: |
            reports/
            data/analyses/
          retention-days: 30
